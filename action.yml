name: "Snapshot Schema Bot"
description: "Detects schema snapshot changes and opens a PR automatically"

inputs:
  github_token:
    description: "GitHub token for pushing branch and creating PR"
    required: true

  branch:
    description: "Snapshot branch to checkout and update"
    required: false
    default: "snapshot-bot/update-snapshots"

  ci-path:
    description: "CI snapshot path"
    required: false
    default: "tests/__snapshots__/ci.cd"

  base-path:
    description: "base snapshot path"
    required: false
    default: "tests/__snapshots__"

runs:
  using: "composite"

  steps:
    - uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Checkout snapshot branch
      shell: bash
      run: |
        python "${{ github.action_path }}/bot/checkout_branch.py" \
          --branch "${{ inputs.branch }}" \
          --ci-path "${{ inputs.ci-path }}" \
          --base-path "${{ inputs.base-path }}"

    - shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"

    - shell: bash
      run: |
        python ${{ github.action_path }}/bot/main.py \
          --branch "${{ inputs.branch }}" \
          --ci-path "${{ inputs.ci-path }}" \
          --base-path "${{ inputs.base-path }}"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        SNAPSHOT_ALREADY_CHECKED_OUT: "1"
