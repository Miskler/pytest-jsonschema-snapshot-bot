name: "Snapshot Schema Bot"
description: "Detects schema snapshot changes and opens a PR automatically"

inputs:
  github_token:
    description: "GitHub token for pushing branch and creating PR"
    required: true

  ci-path:
    description: "CI snapshot path"
    required: false
    default: "tests/__snapshots__/ci.cd"

  base-path:
    description: "base snapshot path"
    required: false
    default: "tests/__snapshots__"

runs:
  using: "composite"

  steps:
    - uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"

    - shell: bash
      run: |
        python ${{ github.action_path }}/bot/main.py \
          --ci-path "${{ inputs.ci-path }}" \
          --base-path "${{ inputs.base-path }}"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}